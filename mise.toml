[tools]
python = "3.14"
uv = "0.11.10"
duckdb = "1.5.2"
hk = "latest"
pkl = "latest"
"github:google/addlicense" = "latest"
actionlint = "latest"
taplo = "latest"
shellcheck = "latest"
shfmt = "latest"
ruff = "0.15.16"
"pipx:sqlfluff" = "4.2.2"

[env]
HK_MISE = 1
LICENSE_TYPE = "mit"
LICENSE_HOLDER = "The Project Contributors"

[settings]
experimental = true
lockfile = true
python.uv_venv_auto = "create|source"
