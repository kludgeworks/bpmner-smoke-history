name: ingest

# Dispatched by bpmner's CI after a smoke run (it mints an Actions:write GitHub-App token and calls
# `gh workflow run ingest.yml -f ...`). This workflow pulls that run's artifacts, consolidates them into
# one per-run JSONL, re-renders the dashboard, and commits — pushing as the App (a Contents:write token,
# which bypasses the branch ruleset on main).
on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: The bpmner Actions run id whose smoke-* artifacts to ingest
        required: true
        type: string
      sha:
        description: The bpmner commit SHA under test
        required: true
        type: string

permissions:
  contents: read

# Serialize ingests so concurrent runs can't race the append-only push (queue, don't cancel).
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  guard:
    # workflow_dispatch inputs are untrusted — validate before doing anything.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 #v4.0.1
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0

      - name: Validate dispatch
        env:
          REF: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RID: ${{ inputs.source_run_id }}
        run: mise run validate-ingest

  ingest:
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # the data push uses the App token (Contents:write), not the default GITHUB_TOKEN
    steps:
      - name: Mint token to write this repo
        id: write-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SMOKE_HISTORY_APP_ID }}
          private-key: ${{ secrets.SMOKE_HISTORY_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.write-token.outputs.token }} # push bypasses the branch ruleset as the App

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 #v4.0.1
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0

      - name: Sync dependencies
        run: uv sync

      - name: Mint token to read bpmner artifacts
        id: read-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SMOKE_HISTORY_APP_ID }}
          private-key: ${{ secrets.SMOKE_HISTORY_APP_PRIVATE_KEY }}
          owner: kludgeworks
          repositories: bpmner
          permission-actions: read

      - name: Download smoke artifacts from the bpmner run
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ steps.read-token.outputs.token }}
          repository: kludgeworks/bpmner
          run-id: ${{ inputs.source_run_id }}
          pattern: smoke-*
          path: smoke-artifacts

      - name: Consolidate, render, commit
        env:
          RID: ${{ inputs.source_run_id }}
          SHA: ${{ inputs.sha }}
          APP_SLUG: ${{ steps.write-token.outputs.app-slug }}
        run: |
          dest="data/year=$(date -u +%Y)/month=$(date -u +%m)"
          mkdir -p "$dest"
          out="$dest/run-$RID.jsonl"
          uv run python -m smoke_history.consolidate smoke-artifacts "$RID" -o "$out"
          if [ ! -s "$out" ]; then
            echo "no smoke rows for run $RID — nothing to publish"
            rm -f "$out"
            exit 0
          fi
          uv run python -m smoke_history.render_dashboard data --assets-dir assets/smoke-health > SMOKE_HEALTH.md
          # 291257155 = bpmner-smoke-history-bot[bot]'s user id; the <id>+ prefix links commits to the App
          # (create-github-app-token has no app-user-id output, and the guard pins this exact slug).
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "291257155+${APP_SLUG}[bot]@users.noreply.github.com"
          git add data SMOKE_HEALTH.md assets
          git commit -m "data: smoke run $RID ($SHA)"
          # Serialized by the concurrency group; rebase-and-retry guards the rare other-writer race and
          # fails loudly (re-dispatchable) rather than silently dropping a run.
          for attempt in 1 2 3; do
            git push && exit 0
            echo "push rejected (attempt $attempt) — rebasing onto origin/main"
            git pull --rebase origin main || { echo "rebase conflict; re-dispatch this run"; exit 1; }
          done
          echo "push failed after retries; re-dispatch this run"; exit 1
