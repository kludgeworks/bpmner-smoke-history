name: CI

on:
  push:
    branches: [main]
    # The ingest pushes machine-generated data + dashboard straight to main; don't run CI for those commits.
    paths-ignore: ['data/**', 'SMOKE_HEALTH.md']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 #v4.0.1
        with:
          install: true
          cache: true
        env:
          MISE_LOCKED: 0

      - name: Sync dependencies
        run: uv sync

      - name: Lint
        run: hk check --all

      - name: Test
        run: uv run pytest -q
